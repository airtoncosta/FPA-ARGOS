};

async function log(msg) {
    document.getElementById('log').innerHTML += '<br>' + msg;
}

async function run() {
    try {
        // Fetch users
        let res = await fetch(url + '?select=*', { headers });
        let users = await res.json();
        log('Users loaded: ' + users.length);
        
        let yvanna = users.find(u => u.name === 'Yvanna Carvalhal' || u.username === 'Yvanna@fpa.com.br' || u.username === 'yvanna');
        if (!yvanna) {
            log('User not found!');
            return;
        }
        log('Found user: ' + yvanna.username);
        
        if (yvanna.username !== 'yvanna') {
            res = await fetch(url + '?username=eq.' + yvanna.username, { method: 'DELETE', headers });
            log('Deleted old user status: ' + res.status);
        } else {
            // Already yvanna, just update
            res = await fetch(url + '?username=eq.yvanna', { method: 'DELETE', headers });
            log('Deleted existing yvanna user status: ' + res.status);
        }
        
        let newUser = {
            ...yvanna,
            username: 'yvanna',
            email: 'yvanna@fpa.com.br',
            password: 'yvanna@2026',
            acesso_multi_municipio: false,
            municipio_vinculado: 'Bacabal-MA',
            role: 'GERENTE'
        };
        
        res = await fetch(url, { method: 'POST', headers, body: JSON.stringify(newUser) });
        let result = await res.json();
        log('Insert new user result: ' + JSON.stringify(result));
        
        log('DONE_SUCCESS');
    } catch (e) {
        log('Error: ' + e);
    }
}
